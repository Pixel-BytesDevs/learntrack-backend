version: '3.8'

services:
  # ==========================================
  # 1. BASES DE DATOS
  # ==========================================
  db-mysql:
    image: mysql:8.0
    container_name: db-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 512M

  db-postgres:
    image: postgres:15
    container_name: db-postgres
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j-service:
    image: neo4j:5
    container_name: neo4j-service
    environment:
      - NEO4J_AUTH=${NEO4J_USER}/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
    deploy:
      resources:
        limits:
          memory: 1536M

  # ==========================================
  # 2. COLUMNA VERTEBRAL SPRING CLOUD
  # ==========================================
  config-server:
    build: ./server-config
    container_name: server-config
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    depends_on:
      - config-server

  auth-server:
    build: ./auth-server
    container_name: auth-server
    ports:
      - "9003:9003"
    environment:
      - AUTH_DB_URL=jdbc:mysql://db-mysql:3306/${MYSQL_DATABASE}
      - AUTH_DB_USER=${MYSQL_USER}
      - AUTH_DB_PASS=${MYSQL_ROOT_PASSWORD}
      - CLIENT_IP=${CLIENT_IP_AUTH}
      - EUREKA_IP=eureka-server
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_IDP_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_IDP_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SPRING_CONFIG_IMPORT=${CONFIG_SERVER_URL}
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=${EUREKA_SERVER_URL}
    depends_on:
      config-server:
        condition: service_healthy

  # ==========================================
  # 3. MICROSERVICIOS DE NEGOCIO
  # ==========================================
  flask-recommendation:
    build: ./motor_adaptabilidad
    container_name: motor_adaptabilidad
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-postgres:5432/interacciones
      - GRAPH_SERVICE_URL=http://gestor-grafo:8083
      - OA_MANAGER_URL=http://fastapi-service:8000
    depends_on:
      - db-postgres
      - gestor-grafo
      - fastapi-service

  gestor-grafo:
    build: ./gestor-grafo-conocimiento
    container_name: gestor-grafo-conocimiento
    ports:
      - "8083:8083"
    environment:
      - NEO4J_URI=bolt://neo4j-service:7687
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASS=${NEO4J_PASSWORD}
      - AUTH_ISSUER_URI=${AUTH_ISSUER_URI}
      - CLIENT_IP=${CLIENT_IP_GRAFO}
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=${EUREKA_SERVER_URL}
      - SPRING_CONFIG_IMPORT=${CONFIG_SERVER_URL}
    depends_on:
      - neo4j-service
      - auth-server
      - config-server

  modulo-diagnostico:
    build: ./modulo-diagnostico
    container_name: modulo-diagnostico
    ports:
      - "8092:8092"
    environment:
      - DIAG_DB_URL=jdbc:postgresql://db-postgres:5432/perfiles_db
      - DIAG_DB_USER=${POSTGRES_USER}
      - DIAG_DB_PASS=${POSTGRES_PASSWORD}
      - AUTH_ISSUER_URI=${AUTH_ISSUER_URI}
      - GEMINI_URL=http://fastapi-service:8000/gemini
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=${EUREKA_SERVER_URL}
      - CLIENT_IP=${CLIENT_IP_DIAG}
      - GATEWAY_IP=fastapi-service
      - SPRING_CONFIG_IMPORT=${CONFIG_SERVER_URL}
    depends_on:
      - db-postgres
      - auth-server
      - gestor-grafo
      - flask-recommendation
      - config-server

  fastapi-service:
    build: ./gestor_oas
    container_name: gestor_oas
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-postgres:5432/learning_objects_db
    depends_on:
      db-postgres:
        condition: service_healthy

# ==========================================
# 4. DEFINICIÓN DE VOLÚMENES PERSISTENTES
# ==========================================
volumes:
  mysql_data:
  postgres_data:
  neo4j_data: